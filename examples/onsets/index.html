<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Audio Onsets Extraction</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">

        <script src="lib/essentia.js-core.umd.js"></script> -->

        src="https://code.jquery.com/jquery-3.1.1.min.js"

        <script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@5.0.1/dist/wavesurfer.min.js"></script>
        <!-- <script src="https://unpkg.com/wavesurfer.js/dist/plugin/wavesurfer.markers.min.js"></script> -->
        <script src="lib/wavesurfer.markers.js"></script>

        <script src="main.js" defer></script>
    </head>
    <body>
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <header>
            <h1>Audio Onset Detection with <a id="essentia-header-link" href="https://mtg.github.io/essentia.js/" target="_blank">Essentia.js <sup><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/>
                <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/>
              </svg></sup></a></h1>
        </header>
        <main>
            <section id="algorithm-controls-section">
                <!-- <div id="fft-controls" class="controls-row">

                </div> -->
                <p>Select <b>Onset Detection Function(s)</b> to use, and how much each should influence the final result (weighting):</p>
                <div id="odf-controls" class="controls-row">
                    <div class="fft-control-wrap">
                        <div class="fft-control">
                            <label for="frameSize">Frame Size</label>
                            <input type="number" name="frameSize" id="frameSize" value="1024" min="1">
                        </div>
                    </div>
                    <div class="fft-control-wrap">
                        <div class="fft-control">
                            <label for="hopSize">Hop Size</label>
                            <input type="number" name="hopSize" id="hopSize" value="512" min="1">
                        </div>
                    </div>
                    <weight-toggle name="hfc"></weight-toggle>
                    <weight-toggle name="complex" ></weight-toggle>
                    <weight-toggle name="complex_phase" ></weight-toggle>
                    <weight-toggle name="flux" ></weight-toggle>
                    <weight-toggle name="rms"></weight-toggle>
                    <weight-toggle name="melflux"></weight-toggle>
                </div>
            </section>
            <section id="file-drop-area">
                <span>Drop file here or click to upload</span>
            </section>
            <section id="zoom-waveform"></section>
        </main>

        <footer>
            <div id="mtg-logo" class="footer-block">
                <p>Made at</p>
                <a href="https://www.upf.edu/web/mtg/" target="_blank"><img src="images/mtg-logo.png" alt="Music Technology Group logo"></a> 
            </div>
            <div id="essentiajs-logo" class="footer-block">
                <p>Using audio analysis from</p> 
                <a href="https://mtg.github.io/essentia.js/" target="_blank"><img src="images/essentia.js-logo.png" alt="Javascript audio analysis library Essentia.js"></a>
            </div>
        </footer>
    </body>

    <template id="playback-controls">
        <div class="controls">
            <button id="backward" class="ui button tiny">
                <i class="step backward icon"></i>
                Backward
            </button>
            <button id="play" class="ui primary button tiny">
                <i class="play icon"></i>
                Play/
                <i class="pause icon"></i>
                Pause
            </button>
            <button id="forward" class="ui button tiny">
                <i class="step forward icon"></i>
                Forward
            </button>
            <button id="mute" class="ui button tiny">
                <i class="volume off icon"></i>
                Toggle Mute
            </button>
        </div>
    </template>
</html>
